<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>イベント投票システム</title>
    <link rel="stylesheet" href="style.css">
    <!-- FingerprintJS (端末特定用ライブラリ) -->
    <script src="https://cdn.jsdelivr.net/npm/@fingerprintjs/fingerprintjs@3/dist/fp.min.js"></script>
</head>
<body>

    <div class="container">
        <!-- Bot対策（ハニーポット）: 人間には見えないが、Botが自動入力すると不正とみなす -->
        <input type="text" id="honey-pot" name="email_confirm" autocomplete="off" tabindex="-1">

        <!-- 0. 投票ボタン画面 -->
        <div id="vote-screen" class="screen">
            <h2>イベント投票</h2>
            <p>ブース番号: <span id="display-booth-id" style="font-weight: bold; font-size: 1.2em;">--</span></p>
            <p class="sub-text">※位置情報へのアクセスを許可してください。<br>※1端末につき1回（いずれかのブース1つのみ）投票可能です。</p>
            <button id="vote-button" class="btn">このブースに投票する</button>
        </div>

        <!-- 1. 読み込み中画面 -->
        <div id="loading-screen" class="screen hidden">
            <div class="spinner"></div>
            <p>セキュリティチェック及び<br>投票処理中です...</p>
            <p class="sub-text">画面を閉じずにお待ちください<br>位置情報と端末情報を確認しています</p>
        </div>

        <!-- 2. 完了画面 -->
        <div id="success-screen" class="screen hidden">
            <div class="icon success">✔</div>
            <h2>投票完了</h2>
            <p>投票を受け付けました。<br>結果発表までお待ちください。</p>
        </div>

        <!-- 3. エラー画面 -->
        <div id="error-screen" class="screen hidden">
            <div class="icon error">!</div>
            <h2>エラー</h2>
            <p id="error-message">予期せぬエラーが発生しました。</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
